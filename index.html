<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antrean Verifikasi Piagam SPMB 2026 - Karanganyar</title>
    <link rel="icon" href="https://i.ibb.co.com/rGLcRm9W/500px-Seal-of-Karanganyar-Regency-svg.png" type="image/png">
    <style>
        /* Memastikan iframe memenuhi 100% layar tanpa scrollbar ganda */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background-color: #f4f7f6; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>

    <iframe id="gasFrame" src="https://script.google.com/macros/s/AKfycbysAT1qZZz7dmC3Ap1vLE7SYKwSrlFsAo7wThrfxi27RT49sExiQKFCyVPq8LXwdVPuFQ/exec" allowfullscreen></iframe>

    <script>
        // Script cerdas untuk menangkap penambahan ?p=admin di URL GitHub
        // dan meneruskannya ke dalam iFrame GAS secara otomatis
        window.onload = function() {
            var iframe = document.getElementById('gasFrame');
            var urlParams = window.location.search; // Mengambil string seperti "?p=admin"
            
            if (urlParams) {
                iframe.src = iframe.src + urlParams;
            }
        }
    </script>
</body>
</html>
